#data configs
data:
  exchange: "binance"
  symbols: 
    - "BTC/USDT"
    # - "ETH/USDT" # add more symbols as needed
  timeframe: "1h"
  total_years: 5
  start_date: "2020-07-01"
  end_date: "2025-07-01"
  max_fill_candles: 2
  #anomaly detection configs
  anomaly_detection:
    rolling_window: 30
    wick_multiplier: 5.0
    wick_percent: 0.75

#feature configs
features:
  selected_features:
    - log_return
    - log_return_6h
    - RSI
    - EMA_ratio
    - ADX
    - ATR_pct
    - volatility_ratio
    - close_location
    - distance_from_high_24h
    - distance_from_low_24h
    - body_pct
    - volume_zscore
    - OBV
    - rolling_sharpe
    - up_streak
    - wick_anomaly_flag

  price:
    log_return_short_period: 1   
    log_return_long_period: 6
    ema_window: 20              
    dist_high_low_window: 24

  momentum:
    rsi_window: 14
    adx_window: 14

  volatility:
    atr_window: 14                 
    vol_ratio_short_window: 24     
    vol_ratio_long_window: 72      
    sharpe_window: 24              
    periods_per_year: 8760 

  volume:
    zscore_window: 20             

#path configs
paths:
  raw_dir:       data/raw
  processed_dir:  data/processed
  feature_engineered_dir: data/features
  logs_dir:      logs
  feature_graphs_dir:    graphs/features

#env configs
env:
  window_len: 48
  max_trade_step: 0.2
  transaction_cost_rate: 0.0005
  max_drawdown: 0.3
  initial_capital: 10000.0

#portfolio configs
portfolio:
  initial_capital: 10000.0
  assets:                     
    - symbol: "BTC/USDT"
      min_trade_notional: 10.0
  fees:
    maker_fee_rate: 0.0005
    taker_fee_rate: 0.0005
  slippage:
    model: "fixed_bps"        # fixed_bps | none (extend with more models later)
    fixed_bps: 5.0             # 5 bps = 0.05% adverse price move per trade      
  rebalance:
    min_rebalance_delta: 0.001  # ignore weight changes smaller than this (avoid dust trades)
  risk:
    max_drawdown: 0.3

#reward configs
reward:
  sharpe_window: 100
  drawdown_penalty_scale: 0.1
  overtrade_penalty_scale: 0.001
  min_buffer_size: 2
  epsilon: 0.01
