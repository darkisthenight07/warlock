#data configs
data:
  exchange: "binance"
  symbols: 
    - "BTC/USDT"
    # - "ETH/USDT" # add more symbols as needed
  timeframe: "1h"
  total_years: 5
  start_date: "2021-06-01"
  end_date: "2026-06-01"
  max_fill_candles: 2
  vol_rolling_days: 30


#path configs
paths:
  raw_dir:       data/raw
  processed_dir:  data/processed

#anomaly detection configs
anomaly_detection:
  rolling_window: 30       # number of candles for the rolling median
  wick_multiplier: 5.0     # wick must be > multiplier × median size
  wick_percent: 0.75       # and > this fraction of the total candle range
