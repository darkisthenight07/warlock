#data configs
data:
  exchange: "binance"
  symbols: 
    - "BTC/USDT"
    # - "ETH/USDT" # add more symbols as needed
  timeframe: "1h"
  total_years: 5
  start_date: "2019-01-01"
  end_date: "2024-01-01"
  max_fill_candles: 2
  #anomaly detection configs
  anomaly_detection:
    rolling_window: 30
    wick_multiplier: 5.0
    wick_percent: 0.75


#path configs
paths:
  raw_dir:       data/raw
  processed_dir:  data/processed
  feature_engineered_dir: data/features
  logs_dir:      logs
  feature_graphs_dir:    graphs/features


